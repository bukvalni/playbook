---
- name: Download Vector DEB package
  ansible.builtin.get_url:
    url: "https://github.com/vectordotdev/vector/releases/download/v{{ vector_version }}/vector_{{ vector_version }}-1_{{ vector_architecture }}.deb"
    dest: "/tmp/vector-{{ vector_version }}.deb"
    mode: "0644"

- name: Install Vector package (Ubuntu/Debian)
  become: true
  ansible.builtin.apt:
    deb: "/tmp/vector-{{ vector_version }}.deb"
    state: present
  notify: Restart Vector service

- name: Ensure Vector configuration directory exists
  become: true
  ansible.builtin.file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: "0755"

- name: Configure Vector
  become: true
  ansible.builtin.template:
    src: vector.yaml.j2
    dest: "{{ vector_config_dir }}/vector.yaml"
    mode: "0644"
  notify: Restart Vector service
